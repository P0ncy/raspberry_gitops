# PV statique média - disque SAMSUNG externe
apiVersion: v1
kind: PersistentVolume
metadata:
  name: arr-media-pv
spec:
  capacity:
    storage: 400Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    name: arr-media
    namespace: arr
  local:
    path: /media/poncy/SAMSUNG
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - poncy
---
# PV pour les téléchargements Transmission (répertoire créé automatiquement)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: arr-downloads-pv
spec:
  capacity:
    storage: 100Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    name: arr-downloads
    namespace: arr
  hostPath:
    path: /var/lib/arr/downloads
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - poncy
