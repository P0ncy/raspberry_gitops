apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prowlarr
  namespace: arr
spec:
  interval: 10m
  chart:
    spec:
      chart: app-template
      version: "3.x"
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      prowlarr:
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/prowlarr
              tag: latest
            env:
              TZ: Europe/Paris
              PUID: "1000"
              PGID: "1000"
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi
    service:
      app:
        controller: prowlarr
        ports:
          http:
            port: 9696
    persistence:
      config:
        existingClaim: prowlarr-config
        globalMounts:
          - path: /config
