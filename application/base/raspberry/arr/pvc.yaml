# Stockage partagé - média (lié au PV statique arr-media-pv)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: arr-media
  namespace: arr
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: ""
  volumeName: arr-media-pv
  resources:
    requests:
      storage: 50Gi
---
